[dependencies.bitflags]
version = "2"

[dependencies.cfg-if]
version = "1.0"

[dependencies.dhat]
version = "0.3"
optional = true

[dependencies.libm]
version = "0.2"

[dependencies.log]
version = "0.4"
default-features = false

[dependencies.mousiki-deep-plc-weights]
version = "0.1.0"
optional = true

[dependencies.mousiki-dred-weights]
version = "0.1.0"
