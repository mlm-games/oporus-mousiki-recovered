[package]
edition = "2024"
name = "mousiki"
version = "0.2.1"
authors = ["nemurubaka <cijiugechu@gmail.com>"] # Had deleted the og repo
build = false
exclude = [
    ".claude",
    ".github",
    ".DS_Store",
    "AGENTS.md",
    "BENCHMARK_COMPARE.md",
    "CLAUDE.md",
    "Dockerfile.opus-fuzz",
    "FIXED_POINT_ALIGN_PLAN.md",
    "ctests",
    "opus-c",
    "opus-go",
    "opus_decode_fuzzer",
    "scripts",
    "testdata",
    "*.opuspkt",
    "*.pcm",
    "*.wav",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Pure Rust Opus codec."
homepage = "https://github.com/MLM-Stuff/mousiki"
readme = "README.md"
keywords = ["audio", "codec", "decoder", "opus"]
categories = ["multimedia", "multimedia::audio", "multimedia::encoding"]
license = "MIT"
repository = "https://github.com/MLM-Stuff/mousiki"

[features]
custom_modes = []
deep_plc = ["dred"]
deep_plc_weights = ["deep_plc", "mousiki-deep-plc-weights"]
deep_plc_weights_fetch = ["deep_plc_weights", "mousiki-deep-plc-weights/fetch"]
default = []
dhat_alloc = ["dep:dhat"]
dred = ["mousiki-dred-weights"]
dred_fetch = ["dred", "mousiki-dred-weights/fetch"]
enable_res24 = ["fixed_point"]
fixed_point = []
force-scalar = []
silk_debug = ["dep:spin"]
silk_strict_asserts = []
silk_tic_toc = ["dep:spin"]

[lib]
name = "mousiki"
path = "src/lib.rs"

